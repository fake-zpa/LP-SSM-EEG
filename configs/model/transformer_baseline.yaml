model: transformer_baseline
name: Transformer Baseline

architecture:
  in_channels: 23
  n_classes: 2
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 256
  dropout: 0.1
  max_seq_len: 1024
  positional_encoding: learned
  pool: cls

training:
  optimizer: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  max_epochs: 100
  scheduler: cosine_warmup
  warmup_steps: 500

amp: true
gradient_checkpointing: true
